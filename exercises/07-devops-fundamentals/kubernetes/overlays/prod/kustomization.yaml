apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: ml-prod

configMapGenerator:
  - name: ml-api-config
    behavior: merge
    literals:
      - environment=prod
      - log_level=WARNING

replicas:
  - name: ml-api
    count: 5

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: ml-api
      spec:
        template:
          spec:
            containers:
            - name: ml-api
              resources:
                requests:
                  memory: "1Gi"
                  cpu: "500m"
                limits:
                  memory: "2Gi"
                  cpu: "1000m"
