# SegmentAI Configuration
# Purpose: Centralized hyperparameters and production settings for clustering

data:
  dataset: "iris"  # Options: "iris", "wine", "make_blobs"
  n_samples: 500  # For make_blobs generator
  n_features: 2  # For make_blobs generator
  centers: 4  # For make_blobs generator
  random_state: 42
  include_ground_truth: true  # Keep labels for evaluation (not used in training)
  
features:
  scale_features: true
  n_components_pca: 2  # PCA dimensionality reduction
  n_neighbors_umap: 15  # UMAP hyperparameter
  min_dist_umap: 0.1  # UMAP minimum distance
  
models:
  kmeans:
    n_clusters_range: [3, 5, 7, 10]  # Try different cluster counts
    max_iter: 300
    n_init: 10
    random_state: 42
  
  dbscan:
    eps_range: [0.3, 0.5, 0.7, 1.0]  # Neighborhood size
    min_samples: 5
    metric: 'euclidean'
  
  hierarchical:
    n_clusters_range: [3, 5, 7, 10]
    linkage: 'ward'  # Options: ward, complete, average, single
    metric: 'euclidean'
  
  gmm:
    n_components_range: [3, 5, 7, 10]
    covariance_type: 'full'  # Options: full, tied, diag, spherical
    max_iter: 100
    random_state: 42

hyperparameter_tuning:
  enabled: false
  n_trials: 30  # Optuna trials
  metric: 'silhouette'  # Options: silhouette, davies_bouldin, calinski_harabasz
  
evaluation:
  metrics:
    - silhouette_score
    - davies_bouldin_index
    - calinski_harabasz_score
  plot_elbow: true
  plot_silhouette: true
  plot_dendrogram: true
  plot_clusters: true
  target_silhouette: 0.5  # Goal threshold
  
api:
  host: '0.0.0.0'
  port: 5000
  debug: false
  max_workers: 4
  timeout_seconds: 30
  
monitoring:
  enabled: true
  metrics_port: 9090
  log_level: 'INFO'
  track_cluster_distribution: true
  
mlflow:
  experiment_name: 'segmentai-clustering'
  tracking_uri: 'file:./mlruns'
  log_model: true
