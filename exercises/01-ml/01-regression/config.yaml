# SmartVal AI Configuration
# Purpose: Centralized hyperparameters and production settings

data:
  test_size: 0.2
  val_size: 0.1
  random_state: 42
  
features:
  polynomial_degree: 2
  scale_features: true
  vif_threshold: 10.0  # Remove features with VIF > 10

models:
  ridge:
    alpha: 1.0
    max_iter: 1000
    solver: 'auto'
  
  lasso:
    alpha: 0.1
    max_iter: 1000
    selection: 'cyclic'
  
  xgboost:
    n_estimators: 100
    max_depth: 6
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42

hyperparameter_tuning:
  enabled: false
  n_trials: 50  # Optuna trials
  cv_folds: 5
  
evaluation:
  cv_folds: 5
  metrics:
    - mae
    - rmse
    - r2
  plot_residuals: true
  plot_learning_curves: true
  
api:
  host: '0.0.0.0'
  port: 5000
  debug: false
  max_workers: 4
  timeout_seconds: 30
  
monitoring:
  enabled: true
  metrics_port: 9090
  log_level: 'INFO'
  
mlflow:
  experiment_name: 'smartval-regression'
  tracking_uri: 'file:./mlruns'
  log_model: true
