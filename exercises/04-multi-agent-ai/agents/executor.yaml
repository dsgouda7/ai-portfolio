# Executor Agent Configuration

name: "ExecutorAgent"
role: "Execute atomic tasks"
description: "Executes atomic tasks with various execution strategies"

max_parallel_tasks: 3
enabled: true

execution_modes:
  - "generic"
  - "computation"
  - "data_processing"

timeout:
  default: 30
  computation: 60
  data_processing: 120

retry_policy:
  max_retries: 3
  backoff_multiplier: 2
  
resource_limits:
  max_memory_mb: 1024
  max_cpu_percent: 80
