apiVersion: v1
kind: Service
metadata:
  name: ml-model-service
  namespace: ml-production
  labels:
    app: ml-model
    component: serving
spec:
  type: LoadBalancer
  selector:
    app: ml-model
    component: serving
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
  sessionAffinity: None
  externalTrafficPolicy: Cluster
