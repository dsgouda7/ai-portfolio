apiVersion: v1
kind: Secret
metadata:
  name: ml-secrets
  namespace: ml-production
type: Opaque
stringData:
  # These are templates - replace with actual secrets in production
  aws-access-key-id: "YOUR_AWS_ACCESS_KEY_ID"
  aws-secret-access-key: "YOUR_AWS_SECRET_ACCESS_KEY"
  mlflow-s3-endpoint: "s3.amazonaws.com"
  redis-password: "YOUR_REDIS_PASSWORD"
  database-url: "postgresql://user:password@localhost:5432/mldb"
